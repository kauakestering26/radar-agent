# Radar Agent — compose pro DONO rodar no notebook dele durante a demo.
#
# Não precisa clonar repo. Baixa só este arquivo, aponta o CONTROL_PLANE_URL
# pra URL do control-plane do dev, e roda:
#
#   docker compose -f docker-compose.demo.yml up -d
#
# Ao final:
#   docker compose -f docker-compose.demo.yml down -v
#
# Nenhuma credencial real do dono é usada por default — o agent escaneia um
# Postgres de teste (já pré-seedado) que sobe no próprio notebook dele. Pra
# apontar pro banco REAL dele, exporte POSTGRES_DSN antes do `up`.

services:

  # ── Postgres de teste (imagem pré-seedada publicada no ghcr.io) ──────────
  postgres-demo:
    image: ghcr.io/kauakestering26/radar-agent/postgres-demo:0.5.0
    container_name: radar-demo-postgres
    environment:
      - POSTGRES_USER=radar
      - POSTGRES_PASSWORD=radar
      - POSTGRES_DB=radar_test
    networks: [radar-demo]
    restart: unless-stopped

  # ── Radar Agent (quem conecta no control-plane do dev) ───────────────────
  agent:
    image: ghcr.io/kauakestering26/radar-agent/agent:0.2.0
    container_name: radar-demo-agent
    environment:
      # Troque pela URL do control-plane do DEV:
      #   Rede local  : ws://192.168.1.42:8000
      #   Cloudflare  : wss://xxx.trycloudflare.com
      - CONTROL_PLANE_URL=${CONTROL_PLANE_URL:-ws://CHANGE_ME:8000}

      # Identificador único deste agent (aparece no dashboard do dev)
      - AGENT_ID=${AGENT_ID:-agent-notebook-dono}

      # Default: escaneia o postgres-demo local acima. Pra apontar pro banco
      # REAL do cliente, exporte POSTGRES_DSN antes do docker compose up:
      #   export POSTGRES_DSN="postgresql://radar_ro:senha@host.docker.internal:5432/app"
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://radar:radar@postgres-demo:5432/radar_test}

      - HEARTBEAT_INTERVAL=10
    depends_on:
      - postgres-demo
    networks: [radar-demo]
    restart: unless-stopped

networks:
  radar-demo:
    driver: bridge
